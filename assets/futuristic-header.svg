<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Susnata Biswas animated futuristic profile banner</title>
  <desc id="desc">A neon cyber grid banner for Susnata Biswas, Electronics and Telecommunication student, coder, and tech explorer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061923"/>
      <stop offset="0.48" stop-color="#07101a"/>
      <stop offset="1" stop-color="#020711"/>
    </linearGradient>
    <linearGradient id="neon" x1="90" y1="50" x2="920" y2="255" gradientUnits="userSpaceOnUse">
      <stop stop-color="#61DAFB"/>
      <stop offset="0.45" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#61DAFB" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#61DAFB" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#61DAFB" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38  0 0 0 0 0.86  0 0 0 0 0.98  0 0 0 0.9 0" result="color"/>
      <feMerge>
        <feMergeNode in="color"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#61DAFB" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>
    <clipPath id="frameClip">
      <rect x="18" y="18" width="964" height="264" rx="24"/>
    </clipPath>
  </defs>

  <rect width="1000" height="300" rx="28" fill="url(#bg)"/>
  <g clip-path="url(#frameClip)">
    <rect x="0" y="0" width="1000" height="300" fill="url(#grid)">
      <animateTransform attributeName="transform" type="translate" values="0 0;48 0;0 0" dur="16s" repeatCount="indefinite"/>
    </rect>
    <rect x="-280" y="0" width="260" height="300" fill="url(#scan)" opacity="0.7">
      <animate attributeName="x" values="-280;1020" dur="5.8s" repeatCount="indefinite"/>
    </rect>
    <path d="M42 245H198L248 205H378L425 170H572L626 130H820L958 64" stroke="#61DAFB" stroke-opacity="0.23" stroke-width="2"/>
    <path d="M58 78H190L230 112H352L410 83H556L610 116H754L808 84H942" stroke="#22C55E" stroke-opacity="0.22" stroke-width="2"/>
    <g filter="url(#softGlow)" opacity="0.65">
      <circle cx="192" cy="245" r="4" fill="#61DAFB">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="425" cy="170" r="4" fill="#22C55E">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="626" cy="130" r="4" fill="#61DAFB">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="808" cy="84" r="4" fill="#A78BFA">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <rect x="18" y="18" width="964" height="264" rx="24" stroke="url(#neon)" stroke-width="2" stroke-opacity="0.86" filter="url(#glow)"/>
  <rect x="34" y="34" width="932" height="232" rx="18" stroke="#61DAFB" stroke-opacity="0.18"/>

  <g filter="url(#glow)">
    <text x="500" y="124" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="3" fill="#F8FAFC">SUSNATA BISWAS</text>
    <text x="500" y="164" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="#61DAFB">ELECTRONICS &amp; TELECOMMUNICATION</text>
  </g>
  <text x="500" y="202" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="18" font-weight="600" letter-spacing="1.2" fill="#D1FAE5">
    Coder  |  Math Lover  |  Tech Explorer
    <animate attributeName="opacity" values="0.65;1;0.65" dur="2.4s" repeatCount="indefinite"/>
  </text>
  <text x="500" y="234" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="15" fill="#94A3B8">turning curiosity into code, and ideas into impact</text>

  <g transform="translate(82 66)" filter="url(#glow)">
    <path d="M0 33L26 0H86L112 33L86 66H26L0 33Z" stroke="#61DAFB" stroke-width="2" fill="#061923" fill-opacity="0.8"/>
    <path d="M32 33L49 17M32 33L49 49M79 33H52" stroke="#22C55E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <animateTransform attributeName="transform" type="translate" values="82 66;82 58;82 66" dur="3.2s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(807 73)" filter="url(#glow)">
    <circle cx="54" cy="54" r="45" stroke="#A78BFA" stroke-width="2" stroke-dasharray="18 8"/>
    <circle cx="54" cy="54" r="28" stroke="#61DAFB" stroke-width="2" stroke-dasharray="8 8"/>
    <path d="M54 14V28M54 80V94M14 54H28M80 54H94" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="54" cy="54" r="6" fill="#61DAFB"/>
    <animateTransform attributeName="transform" type="rotate" from="0 861 127" to="360 861 127" dur="12s" repeatCount="indefinite"/>
  </g>
</svg>
