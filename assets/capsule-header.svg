    </circle>
  </g>

  <path d="M0 106C130 86 246 86 372 105C502 125 642 143 790 119C940 95 1046 76 1200 96V150H0V106Z" fill="url(#wave)">
    <animate attributeName="d" dur="5s" repeatCount="indefinite" values="M0 106C130 86 246 86 372 105C502 125 642 143 790 119C940 95 1046 76 1200 96V150H0V106Z;M0 98C144 118 258 84 394 100C536 117 644 136 792 111C940 86 1060 101 1200 88V150H0V98Z;M0 106C130 86 246 86 372 105C502 125 642 143 790 119C940 95 1046 76 1200 96V150H0V106Z"/>
  </path>

  <g filter="url(#textGlow)">
    <text x="600" y="63" text-anchor="middle" fill="#61DAFB" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="48" font-weight="800">
