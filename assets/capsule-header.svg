    </circle>
    <circle cx="255" cy="72" r="1.8" fill="#61DAFB">
      <animate attributeName="opacity" values="1;0.12;1" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="910" cy="46" r="2.4" fill="#61DAFB">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1055" cy="84" r="1.9" fill="#61DAFB">
