<svg width="1200" height="150" viewBox="0 0 1200 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hi, I'm Susnata Biswas</title>
  <desc id="desc">Electronics and Telecommunication Student, Coder, Tech Explorer</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A8296"/>
      <stop offset="1" stop-color="#091519"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="95" x2="1200" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#61DAFB" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#3A8296" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="textGlow" x="-15%" y="-45%" width="130%" height="190%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38 0 0 0 0 0.85 0 0 0 0 0.98 0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="150" fill="url(#bg)"/>
  <g opacity="0.72">
    <circle cx="130" cy="34" r="2.2" fill="#61DAFB">
