<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Susnata Biswas animated warp star profile hero</title>
  <desc id="desc">A GitHub-safe animated star scroll and warp speed profile banner inspired by a cosmic scrolling page.</desc>
  <defs>
    <radialGradient id="purpleGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(958 76) rotate(138) scale(610 405)">
      <stop stop-color="#7c3aed" stop-opacity="0.56"/>
      <stop offset="0.62" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(142 630) rotate(-32) scale(570 340)">
      <stop stop-color="#06b6d4" stop-opacity="0.5"/>
      <stop offset="0.58" stop-color="#06b6d4" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 360) scale(260 180)">
      <stop stop-color="#e8edf2" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#06b6d4" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0b0f14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="219" y1="143" x2="981" y2="577" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.48" stop-color="#0f172a" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="rim" x1="190" y1="118" x2="1010" y2="608" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8edf2"/>
      <stop offset="0.22" stop-color="#06b6d4"/>
      <stop offset="0.58" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="warpLine" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="306" y1="0" x2="894" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.44" stop-color="#dff9ff"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="glow" x="-35%" y="-60%" width="170%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38 0 0 0 0 0.90 0 0 0 0 1 0 0 0 0.85 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <pattern id="microGrid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" stroke="#e8edf2" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <style>
      .ui { font-family: "Segoe UI", Arial, sans-serif; }
      .mono { font-family: Consolas, Monaco, "Courier New", monospace; }
      .title { font: 900 62px "Segoe UI", Arial, sans-serif; letter-spacing: 2px; }
      .sub { font: 800 18px "Segoe UI", Arial, sans-serif; letter-spacing: 5px; fill: #67e8f9; }
      .tiny { font: 700 14px Consolas, Monaco, "Courier New", monospace; fill: #aab9c6; letter-spacing: 1px; }
      .pillText { font: 800 14px "Segoe UI", Arial, sans-serif; letter-spacing: 1.5px; fill: #e8edf2; }
      .starA { opacity: 0.48; }
      .starB { opacity: 0.82; }
      .starC { opacity: 0.3; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="34" fill="#0b0f14"/>
  <rect width="1200" height="720" rx="34" fill="url(#purpleGlow)"/>
  <rect width="1200" height="720" rx="34" fill="url(#cyanGlow)"/>
  <rect width="1200" height="720" rx="34" fill="url(#centerLight)"/>
  <rect width="1200" height="720" rx="34" fill="url(#microGrid)" opacity="0.75">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 38;0 0" dur="18s" repeatCount="indefinite"/>
  </rect>

  <g opacity="0.75">
    <circle class="starA" cx="84" cy="88" r="1.4" fill="#fff"><animate attributeName="opacity" values="0.22;1;0.22" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle class="starC" cx="158" cy="248" r="1.1" fill="#fff"><animate attributeName="opacity" values="0.12;0.7;0.12" dur="4.7s" repeatCount="indefinite"/></circle>
    <circle class="starB" cx="244" cy="116" r="1.8" fill="#fff"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle class="starA" cx="310" cy="630" r="1.3" fill="#fff"><animate attributeName="opacity" values="0.18;0.9;0.18" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle class="starC" cx="402" cy="76" r="1.1" fill="#fff"><animate attributeName="opacity" values="0.15;0.82;0.15" dur="5.1s" repeatCount="indefinite"/></circle>
    <circle class="starB" cx="508" cy="122" r="1.9" fill="#fff"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle class="starA" cx="706" cy="78" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle class="starC" cx="812" cy="604" r="1.2" fill="#fff"><animate attributeName="opacity" values="0.14;0.76;0.14" dur="5.3s" repeatCount="indefinite"/></circle>
    <circle class="starB" cx="972" cy="198" r="2" fill="#fff"><animate attributeName="opacity" values="0.24;1;0.24" dur="3s" repeatCount="indefinite"/></circle>
    <circle class="starA" cx="1110" cy="90" r="1.4" fill="#fff"><animate attributeName="opacity" values="0.22;0.88;0.22" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle class="starC" cx="1064" cy="570" r="1.2" fill="#fff"><animate attributeName="opacity" values="0.12;0.72;0.12" dur="5.8s" repeatCount="indefinite"/></circle>
    <circle class="starA" cx="80" cy="582" r="1.6" fill="#fff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle class="starB" cx="690" cy="650" r="1.8" fill="#fff"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle class="starC" cx="580" cy="48" r="1" fill="#fff"><animate attributeName="opacity" values="0.1;0.68;0.1" dur="4.9s" repeatCount="indefinite"/></circle>
  </g>

  <g opacity="0.72" filter="url(#glow)">
    <g>
      <line x1="116" y1="-160" x2="116" y2="-38" stroke="url(#warpLine)" stroke-width="2.4" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 930" dur="3.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.7s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="228" y1="-220" x2="228" y2="-58" stroke="url(#warpLine)" stroke-width="1.8" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 980" dur="4.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4.6s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="410" y1="-130" x2="410" y2="-4" stroke="url(#warpLine)" stroke-width="2.8" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 900" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.1s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="548" y1="-200" x2="548" y2="-34" stroke="url(#warpLine)" stroke-width="2.1" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 960" dur="4.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.95;0" dur="4.1s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="692" y1="-250" x2="692" y2="-72" stroke="url(#warpLine)" stroke-width="2.6" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 1040" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.4s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="826" y1="-160" x2="826" y2="-20" stroke="url(#warpLine)" stroke-width="1.9" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 940" dur="4.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="4.9s" repeatCount="indefinite"/>
    </g>
    <g>
      <line x1="1012" y1="-118" x2="1012" y2="10" stroke="url(#warpLine)" stroke-width="3.1" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 880" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.9s" repeatCount="indefinite"/>
    </g>
  </g>

  <g opacity="0.48" filter="url(#glow)">
    <line x1="132" y1="520" x2="132" y2="660" stroke="url(#warpLine)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="270" y1="78" x2="270" y2="218" stroke="url(#warpLine)" stroke-width="1.7" stroke-linecap="round"/>
    <line x1="930" y1="118" x2="930" y2="274" stroke="url(#warpLine)" stroke-width="2" stroke-linecap="round"/>
    <line x1="1084" y1="440" x2="1084" y2="620" stroke="url(#warpLine)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <g filter="url(#softBlur)" opacity="0.44">
    <ellipse cx="600" cy="361" rx="350" ry="92" fill="#06b6d4"/>
    <ellipse cx="600" cy="356" rx="250" ry="66" fill="#7c3aed"/>
  </g>

  <g filter="url(#deepShadow)">
    <rect x="166" y="120" width="868" height="480" rx="36" fill="url(#glass)" stroke="url(#rim)" stroke-width="2.2"/>
    <rect x="190" y="146" width="820" height="428" rx="27" fill="#0b0f14" fill-opacity="0.58" stroke="#ffffff" stroke-opacity="0.13"/>
  </g>

  <g filter="url(#glow)">
    <text x="600" y="264" text-anchor="middle" class="title" fill="url(#titleFill)">SUSNATA BISWAS</text>
    <text x="600" y="304" text-anchor="middle" class="sub">E&amp;T STUDENT | CODER | TECH EXPLORER</text>
  </g>
  <text x="600" y="344" text-anchor="middle" class="tiny">curiosity -> code -> projects -> impact</text>

  <g class="ui">
    <rect x="292" y="390" width="146" height="44" rx="22" fill="#0f172a" fill-opacity="0.76" stroke="#67e8f9" stroke-opacity="0.48"/>
    <text x="365" y="418" text-anchor="middle" class="pillText">PYTHON</text>
    <rect x="456" y="390" width="126" height="44" rx="22" fill="#0f172a" fill-opacity="0.76" stroke="#22c55e" stroke-opacity="0.48"/>
    <text x="519" y="418" text-anchor="middle" class="pillText">KOTLIN</text>
    <rect x="600" y="390" width="112" height="44" rx="22" fill="#0f172a" fill-opacity="0.76" stroke="#7c3aed" stroke-opacity="0.6"/>
    <text x="656" y="418" text-anchor="middle" class="pillText">JS</text>
    <rect x="730" y="390" width="178" height="44" rx="22" fill="#0f172a" fill-opacity="0.76" stroke="#06b6d4" stroke-opacity="0.5"/>
    <text x="819" y="418" text-anchor="middle" class="pillText">ANDROID</text>
  </g>

  <g class="mono" font-size="16" filter="url(#glow)">
    <text x="332" y="492" fill="#aab9c6">$ boot profile --mode warp-speed</text>
    <text x="332" y="526" fill="#e8edf2"><tspan fill="#06b6d4">&gt;</tspan> building practical projects with code, math, and electronics</text>
  </g>
  <rect x="902" y="511" width="11" height="23" rx="4" fill="#67e8f9" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <path d="M206 628H390L430 594H770L812 628H994" stroke="#06b6d4" stroke-opacity="0.42" stroke-width="2"/>
  <path d="M206 96H386L430 126H770L812 96H994" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="2"/>
</svg>
