<svg width="1200" height="240" viewBox="0 0 1200 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated terminal transmission</title>
  <desc id="desc">A premium animated terminal panel for Susnata Biswas showing learning, building, and sharing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="1" stop-color="#03060d"/>
    </linearGradient>
    <linearGradient id="rim" x1="36" y1="22" x2="1164" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#67e8f9" fill-opacity="0.16"/>
    </pattern>
    <style>
      .mono { font-family: Consolas, Monaco, "Courier New", monospace; }
      .prompt { font: 700 22px Consolas, Monaco, "Courier New", monospace; fill: #e2e8f0; }
      .muted { font: 600 15px Consolas, Monaco, "Courier New", monospace; fill: #94a3b8; }
      .cyan { fill: #67e8f9; }
      .green { fill: #22c55e; }
      .violet { fill: #a78bfa; }
    </style>
  </defs>
  <rect width="1200" height="240" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="240" rx="26" fill="url(#dots)"/>
  <rect x="28" y="24" width="1144" height="192" rx="22" stroke="url(#rim)" stroke-width="2" filter="url(#glow)"/>
  <rect x="54" y="50" width="1092" height="42" rx="16" fill="#0b1524" stroke="#ffffff" stroke-opacity="0.08"/>
  <circle cx="80" cy="71" r="7" fill="#ef4444"/>
  <circle cx="103" cy="71" r="7" fill="#f59e0b"/>
  <circle cx="126" cy="71" r="7" fill="#22c55e"/>
  <text x="162" y="78" class="muted">susnata@github-profile: ~/future-builds</text>

  <g filter="url(#glow)">
    <text x="74" y="130" class="prompt"><tspan class="green">$</tspan> boot --profile SUSNATA --mode realistic-ui</text>
    <text x="74" y="168" class="prompt"><tspan class="cyan">></tspan> electronics + code + math + android = impact</text>
    <text x="74" y="206" class="prompt"><tspan class="violet">></tspan> pipeline: learn -> build -> share -> repeat</text>
    <rect x="625" y="190" width="12" height="24" rx="3" fill="#67e8f9">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="-240" y="24" width="210" height="192" fill="#67e8f9" opacity="0.12">
    <animate attributeName="x" values="-240;1230" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
