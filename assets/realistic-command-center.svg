<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Susnata Biswas realistic futuristic portfolio command center</title>
  <desc id="desc">A premium animated dark glass dashboard for Susnata Biswas with coding, electronics, Android, and project UI elements.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111f"/>
      <stop offset="0.48" stop-color="#050b14"/>
      <stop offset="1" stop-color="#02050b"/>
    </linearGradient>
    <linearGradient id="rim" x1="70" y1="40" x2="1130" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7dd3fc"/>
      <stop offset="0.38" stop-color="#22c55e"/>
      <stop offset="0.72" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#13263a" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#07111f" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#11263a" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#07111f" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="codeGlow" x1="365" y1="168" x2="900" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9" stop-opacity="0.18"/>
      <stop offset="0.52" stop-color="#22c55e" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#67e8f9" stop-opacity="0"/>
      <stop offset="0.52" stop-color="#67e8f9" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.88 0 0 0 0 0.98 0 0 0 0.85 0" result="cyan"/>
      <feMerge>
        <feMergeNode in="cyan"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" stroke="#67e8f9" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      .ui { font-family: "Segoe UI", Arial, sans-serif; }
      .mono { font-family: Consolas, Monaco, "Courier New", monospace; }
      .tiny { font: 600 14px Consolas, Monaco, "Courier New", monospace; fill: #94a3b8; }
      .label { font: 700 14px "Segoe UI", Arial, sans-serif; letter-spacing: 1px; fill: #cbd5e1; }
      .small { font: 600 15px "Segoe UI", Arial, sans-serif; fill: #dbeafe; }
      .title { font: 900 54px "Segoe UI", Arial, sans-serif; letter-spacing: 2px; fill: #f8fafc; }
      .sub { font: 800 17px "Segoe UI", Arial, sans-serif; letter-spacing: 3px; fill: #67e8f9; }
      .panel-title { font: 800 18px "Segoe UI", Arial, sans-serif; letter-spacing: 1px; fill: #f8fafc; }
      .muted { fill: #94a3b8; }
      .cyan { fill: #67e8f9; }
      .green { fill: #22c55e; }
      .violet { fill: #a78bfa; }
      .stroke-soft { stroke: #94a3b8; stroke-opacity: 0.18; }
      .stroke-cyan { stroke: #67e8f9; stroke-opacity: 0.55; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#page)"/>
  <rect width="1200" height="720" rx="36" fill="url(#grid)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0 0;46 0;0 0" dur="18s" repeatCount="indefinite"/>
  </rect>
  <path d="M70 618C215 545 275 662 421 587C573 508 617 608 756 534C900 457 969 537 1132 454" stroke="#67e8f9" stroke-opacity="0.13" stroke-width="3"/>
  <path d="M84 128C231 77 314 155 449 102C607 41 710 137 862 82C977 41 1037 70 1128 112" stroke="#22c55e" stroke-opacity="0.12" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="46" y="36" width="1108" height="648" rx="34" fill="#050b14" stroke="url(#rim)" stroke-width="2.2"/>
    <rect x="68" y="58" width="1064" height="604" rx="26" fill="#07111f" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <rect x="69" y="58" width="1062" height="76" rx="26" fill="#0b1524" stroke="#ffffff" stroke-opacity="0.08"/>
  <g class="ui">
    <circle cx="105" cy="96" r="8" fill="#ef4444"/>
    <circle cx="130" cy="96" r="8" fill="#f59e0b"/>
    <circle cx="155" cy="96" r="8" fill="#22c55e"/>
    <text x="190" y="102" class="small" fill="#e2e8f0">SUSNATA.OS / portfolio.command-center</text>
    <rect x="814" y="75" width="122" height="42" rx="21" fill="#071b14" stroke="#22c55e" stroke-opacity="0.55"/>
    <circle cx="836" cy="96" r="6" fill="#22c55e">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.35s" repeatCount="indefinite"/>
    </circle>
    <text x="855" y="101" class="label" fill="#bbf7d0">HIRE ME</text>
    <rect x="952" y="75" width="142" height="42" rx="21" fill="#0b1728" stroke="#67e8f9" stroke-opacity="0.45"/>
    <text x="980" y="101" class="label">BUILD MODE</text>
  </g>

  <g filter="url(#glow)">
    <text x="600" y="202" text-anchor="middle" class="title">SUSNATA BISWAS</text>
    <text x="600" y="237" text-anchor="middle" class="sub">E&amp;T STUDENT | CODER | TECH EXPLORER</text>
  </g>
  <text x="600" y="270" text-anchor="middle" class="tiny">turning curiosity into code, and ideas into impact</text>

  <rect x="94" y="172" width="242" height="426" rx="24" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.1"/>
  <rect x="116" y="194" width="198" height="132" rx="22" fill="#091827" stroke="#67e8f9" stroke-opacity="0.26"/>
  <circle cx="215" cy="250" r="43" fill="#0e2538" stroke="#67e8f9" stroke-opacity="0.55" filter="url(#glow)"/>
  <text x="215" y="266" text-anchor="middle" class="ui" font-size="42" font-weight="900" fill="#f8fafc">SB</text>
  <text x="215" y="356" text-anchor="middle" class="panel-title">Mission Profile</text>
  <text x="215" y="384" text-anchor="middle" class="tiny">student.developer()</text>
  <g>
    <rect x="121" y="414" width="188" height="34" rx="17" fill="#0d1b2d" stroke="#67e8f9" stroke-opacity="0.24"/>
    <text x="145" y="436" class="tiny" fill="#dbeafe">Python</text>
    <rect x="231" y="423" width="56" height="8" rx="4" fill="#13263a"/>
    <rect x="231" y="423" width="43" height="8" rx="4" fill="#67e8f9">
      <animate attributeName="width" values="24;48;43;24" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="121" y="462" width="188" height="34" rx="17" fill="#0d1b2d" stroke="#22c55e" stroke-opacity="0.24"/>
    <text x="145" y="484" class="tiny" fill="#dbeafe">Kotlin</text>
    <rect x="231" y="471" width="56" height="8" rx="4" fill="#13263a"/>
    <rect x="231" y="471" width="39" height="8" rx="4" fill="#22c55e">
      <animate attributeName="width" values="18;44;39;18" dur="4.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="121" y="510" width="188" height="34" rx="17" fill="#0d1b2d" stroke="#a78bfa" stroke-opacity="0.24"/>
    <text x="145" y="532" class="tiny" fill="#dbeafe">Electronics</text>
    <rect x="231" y="519" width="56" height="8" rx="4" fill="#13263a"/>
    <rect x="231" y="519" width="48" height="8" rx="4" fill="#a78bfa">
      <animate attributeName="width" values="28;52;48;28" dur="4.7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="365" y="304" width="526" height="294" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
  <rect x="388" y="326" width="480" height="42" rx="14" fill="#091827" stroke="#67e8f9" stroke-opacity="0.18"/>
  <rect x="406" y="339" width="96" height="16" rx="8" fill="#0f2a3d" stroke="#67e8f9" stroke-opacity="0.2"/>
  <text x="424" y="352" class="tiny" font-size="12" fill="#bae6fd">profile.ts</text>
  <rect x="516" y="339" width="92" height="16" rx="8" fill="#111827"/>
  <text x="534" y="352" class="tiny" font-size="12">android.kt</text>
  <rect x="622" y="339" width="88" height="16" rx="8" fill="#111827"/>
  <text x="642" y="352" class="tiny" font-size="12">logic.c</text>
  <rect x="388" y="386" width="480" height="188" rx="14" fill="#050b14" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="388" y="386" width="480" height="188" rx="14" fill="url(#codeGlow)"/>
  <rect x="386" y="386" width="120" height="188" fill="url(#scan)" opacity="0.65">
    <animate attributeName="x" values="260;860;260" dur="5.8s" repeatCount="indefinite"/>
  </rect>
  <g class="mono" font-size="15">
    <text x="414" y="423" fill="#475569">01</text>
    <text x="452" y="423"><tspan fill="#a78bfa">const</tspan><tspan fill="#e2e8f0"> student = </tspan><tspan fill="#22c55e">"Susnata Biswas"</tspan></text>
    <text x="414" y="453" fill="#475569">02</text>
    <text x="452" y="453"><tspan fill="#67e8f9">focus</tspan><tspan fill="#e2e8f0"> = [</tspan><tspan fill="#22c55e">"code"</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#22c55e">"math"</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#22c55e">"electronics"</tspan><tspan fill="#e2e8f0">]</tspan></text>
    <text x="414" y="483" fill="#475569">03</text>
    <text x="452" y="483"><tspan fill="#a78bfa">build</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#67e8f9">weatherApp</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#67e8f9">androidLab</tspan><tspan fill="#e2e8f0">)</tspan></text>
    <text x="414" y="513" fill="#475569">04</text>
    <text x="452" y="513"><tspan fill="#f59e0b">while</tspan><tspan fill="#e2e8f0">(curious) learn(); share();</tspan></text>
    <text x="414" y="543" fill="#475569">05</text>
    <text x="452" y="543"><tspan fill="#22c55e">status</tspan><tspan fill="#e2e8f0">: ready_for_real_projects</tspan><tspan fill="#67e8f9">_</tspan></text>
  </g>
  <rect x="750" y="531" width="9" height="19" rx="3" fill="#67e8f9">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <rect x="926" y="174" width="176" height="424" rx="34" fill="#05070d" stroke="#dbeafe" stroke-opacity="0.28" stroke-width="2"/>
  <rect x="942" y="196" width="144" height="382" rx="24" fill="#08111f" stroke="#67e8f9" stroke-opacity="0.18"/>
  <rect x="978" y="210" width="72" height="6" rx="3" fill="#1f2937"/>
  <text x="1014" y="258" text-anchor="middle" class="label" fill="#e2e8f0">ANDROID LAB</text>
  <circle cx="1014" cy="320" r="44" fill="#0d1b2d" stroke="#22c55e" stroke-opacity="0.5" filter="url(#glow)"/>
  <path d="M992 315L1007 330L1038 298" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="966" y="392" width="96" height="22" rx="11" fill="#0d1b2d" stroke="#67e8f9" stroke-opacity="0.3"/>
  <text x="1014" y="408" text-anchor="middle" class="tiny" font-size="11">KOTLIN</text>
  <rect x="966" y="430" width="96" height="22" rx="11" fill="#0d1b2d" stroke="#a78bfa" stroke-opacity="0.3"/>
  <text x="1014" y="446" text-anchor="middle" class="tiny" font-size="11">UI BUILD</text>
  <rect x="966" y="468" width="96" height="22" rx="11" fill="#0d1b2d" stroke="#22c55e" stroke-opacity="0.3"/>
  <text x="1014" y="484" text-anchor="middle" class="tiny" font-size="11">PROJECTS</text>
  <circle cx="1014" cy="548" r="8" fill="#101827" stroke="#94a3b8" stroke-opacity="0.35"/>

  <g class="ui">
    <rect x="94" y="620" width="244" height="38" rx="19" fill="#081827" stroke="#67e8f9" stroke-opacity="0.26"/>
    <text x="123" y="645" class="tiny">C | Python | Kotlin | JS</text>
    <rect x="365" y="620" width="244" height="38" rx="19" fill="#081827" stroke="#22c55e" stroke-opacity="0.26"/>
    <text x="394" y="645" class="tiny">VS Code | Git | Linux</text>
    <rect x="636" y="620" width="255" height="38" rx="19" fill="#081827" stroke="#a78bfa" stroke-opacity="0.26"/>
    <text x="665" y="645" class="tiny">learning -> building -> sharing</text>
    <rect x="926" y="620" width="176" height="38" rx="19" fill="#071b14" stroke="#22c55e" stroke-opacity="0.5"/>
    <text x="973" y="645" class="tiny" fill="#bbf7d0">OPEN TO WORK</text>
  </g>

  <g filter="url(#soft)" opacity="0.45">
    <path d="M76 58H1124" stroke="#67e8f9" stroke-width="2"/>
    <path d="M76 662H1124" stroke="#a78bfa" stroke-width="2"/>
  </g>
</svg>
