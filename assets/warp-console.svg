<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated warp console</title>
  <desc id="desc">A GitHub-safe animated cosmic terminal panel with twinkling stars and build pipeline text.</desc>
  <defs>
    <radialGradient id="purple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 20) rotate(150) scale(520 260)">
      <stop stop-color="#7c3aed" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 240) rotate(-25) scale(520 230)">
      <stop stop-color="#06b6d4" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="36" y1="22" x2="1164" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8edf2"/>
      <stop offset="0.22" stop-color="#06b6d4"/>
      <stop offset="0.66" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#06b6d4" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#e8edf2" fill-opacity="0.16"/>
    </pattern>
    <style>
      .mono { font-family: Consolas, Monaco, "Courier New", monospace; }
      .line { font: 800 22px Consolas, Monaco, "Courier New", monospace; fill: #e8edf2; }
      .top { font: 700 15px Consolas, Monaco, "Courier New", monospace; fill: #aab9c6; }
      .cyan { fill: #06b6d4; }
      .green { fill: #22c55e; }
      .purple { fill: #a78bfa; }
    </style>
  </defs>
  <rect width="1200" height="260" rx="28" fill="#0b0f14"/>
  <rect width="1200" height="260" rx="28" fill="url(#purple)"/>
  <rect width="1200" height="260" rx="28" fill="url(#cyan)"/>
  <rect width="1200" height="260" rx="28" fill="url(#dots)">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 30;0 0" dur="16s" repeatCount="indefinite"/>
  </rect>
  <rect x="30" y="25" width="1140" height="210" rx="24" fill="#0f172a" fill-opacity="0.58" stroke="url(#rim)" stroke-width="2.2" filter="url(#glow)"/>
  <rect x="56" y="51" width="1088" height="44" rx="16" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.1"/>
  <circle cx="84" cy="73" r="7" fill="#ef4444"/>
  <circle cx="108" cy="73" r="7" fill="#f59e0b"/>
  <circle cx="132" cy="73" r="7" fill="#22c55e"/>
  <text x="166" y="79" class="top">susnata@starscroll: ~/github-profile</text>

  <g filter="url(#glow)">
    <text x="76" y="136" class="line"><tspan class="green">$</tspan> init --starfield --portfolio</text>
    <text x="76" y="176" class="line"><tspan class="cyan">&gt;</tspan> skills: C, Python, Kotlin, JavaScript, HTML, CSS</text>
    <text x="76" y="216" class="line"><tspan class="purple">&gt;</tspan> tools: VS Code, Android Studio, GitHub, Git, Linux</text>
    <rect x="812" y="199" width="12" height="25" rx="4" fill="#67e8f9">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="-260" y="25" width="230" height="210" fill="url(#scan)" opacity="0.9">
    <animate attributeName="x" values="-260;1230" dur="5.4s" repeatCount="indefinite"/>
  </rect>
  <g opacity="0.65">
    <circle cx="1010" cy="128" r="1.5" fill="#fff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1070" cy="186" r="1.2" fill="#fff"><animate attributeName="opacity" values="0.15;0.8;0.15" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="958" cy="206" r="1.7" fill="#fff"><animate attributeName="opacity" values="0.24;1;0.24" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>
