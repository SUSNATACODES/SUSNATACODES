<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hi, I'm Susnata Biswas</title>
  <desc id="desc">Electronics and Telecommunication Student, Coder, and Tech Explorer</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091519"/>
      <stop offset="0.55" stop-color="#16343C"/>
      <stop offset="1" stop-color="#3A8296"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="210" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#61DAFB" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3A8296" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" stroke="#61DAFB" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38 0 0 0 0 0.85 0 0 0 0 0.98 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="24" fill="url(#grid)"/>

  <circle cx="995" cy="74" r="132" fill="#61DAFB" opacity="0.09"/>
  <circle cx="1075" cy="118" r="84" fill="#7DD3FC" opacity="0.11"/>
  <circle cx="135" cy="248" r="112" fill="#3A8296" opacity="0.18"/>

  <path d="M0 234C120 210 216 208 333 232C466 259 584 284 731 252C890 218 1016 170 1200 208V320H0V234Z" fill="url(#wave)"/>
  <path d="M0 262C151 226 256 230 390 257C532 285 670 298 811 266C963 231 1082 220 1200 242V320H0V262Z" fill="#61DAFB" opacity="0.12"/>

  <g filter="url(#glow)">
    <text x="74" y="122" fill="#61DAFB" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0">
      Hi, I'm Susnata Biswas
    </text>
  </g>
  <text x="78" y="168" fill="#E6F7FA" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="25" font-weight="600" letter-spacing="0">
    Electronics &amp; Telecommunication Student | Coder | Tech Explorer
  </text>
  <text x="78" y="205" fill="#B7E6EF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="0">
    Turning curiosity into code, and ideas into impact.
  </text>

  <g transform="translate(78 234)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15" font-weight="700">
    <rect width="86" height="34" rx="17" fill="#0B1F26" stroke="#61DAFB" stroke-opacity="0.35"/>
    <text x="24" y="22" fill="#DFF9FF">C</text>
    <rect x="100" width="122" height="34" rx="17" fill="#0B1F26" stroke="#61DAFB" stroke-opacity="0.35"/>
    <text x="124" y="22" fill="#DFF9FF">Python</text>
    <rect x="236" width="112" height="34" rx="17" fill="#0B1F26" stroke="#61DAFB" stroke-opacity="0.35"/>
    <text x="260" y="22" fill="#DFF9FF">Kotlin</text>
    <rect x="362" width="138" height="34" rx="17" fill="#0B1F26" stroke="#61DAFB" stroke-opacity="0.35"/>
    <text x="386" y="22" fill="#DFF9FF">JavaScript</text>
  </g>
