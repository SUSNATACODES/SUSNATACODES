<svg width="940" height="178" viewBox="0 0 940 178" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hire Me contribution calendar</title>
  <desc id="desc">A GitHub contribution calendar style graphic where green contribution squares spell HIRE ME.</desc>
  <defs>
    <pattern id="emptyCell" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect x="0.5" y="0.5" width="10" height="10" rx="2" fill="#161B22" stroke="#21262D"/>
    </pattern>
    <pattern id="activeCell" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect x="0.5" y="0.5" width="10" height="10" rx="2" fill="#39D353"/>
    </pattern>
    <filter id="glow" x="-8%" y="-18%" width="116%" height="136%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.83 0 0 0 0 0.33 0 0 0 0.75 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <mask id="hireMask" x="0" y="0" width="940" height="178" maskUnits="userSpaceOnUse">
      <rect width="940" height="178" fill="black"/>
      <text x="470" y="128" text-anchor="middle" fill="white" font-family="Arial Black, Segoe UI Black, Arial, sans-serif" font-size="90" font-weight="900" letter-spacing="6">
        HIRE ME
      </text>
    </mask>
  </defs>

  <rect x="1" y="1" width="938" height="176" rx="6" fill="#0D1117" stroke="#30363D"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" fill="#C9D1D9">
    <text x="68" y="30">Mar</text>
    <text x="126" y="30">Apr</text>
    <text x="190" y="30">May</text>
    <text x="265" y="30">Jun</text>
    <text x="335" y="30">Jul</text>
    <text x="414" y="30">Aug</text>
    <text x="480" y="30">Sep</text>
    <text x="545" y="30">Oct</text>
    <text x="620" y="30">Nov</text>
    <text x="694" y="30">Dec</text>
    <text x="772" y="30">Jan</text>
    <text x="850" y="30">Feb</text>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" fill="#C9D1D9">
    <text x="24" y="68">Mon</text>
    <text x="24" y="98">Wed</text>
    <text x="30" y="128">Fri</text>
  </g>

  <rect x="68" y="44" width="795" height="105" fill="url(#emptyCell)"/>
  <rect x="68" y="44" width="795" height="105" fill="url(#activeCell)" filter="url(#glow)" mask="url(#hireMask)"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" fill="#8B949E">
    <text x="68" y="165">Learn how we count contributions</text>
    <text x="790" y="165">Less</text>
    <rect x="820.5" y="154.5" width="10" height="10" rx="2" fill="#161B22" stroke="#21262D"/>
    <rect x="836.5" y="154.5" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="852.5" y="154.5" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="868.5" y="154.5" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="884.5" y="154.5" width="10" height="10" rx="2" fill="#39D353"/>
    <text x="902" y="165">More</text>
  </g>
</svg>
