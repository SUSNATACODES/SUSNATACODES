<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hire Me contribution-style calendar</title>
  <desc id="desc">A contribution calendar style graphic spelling HIRE ME with green dots.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.55" stop-color="#101820"/>
      <stop offset="1" stop-color="#10261B"/>
    </linearGradient>
    <pattern id="emptySquares" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect x="3" y="3" width="12" height="12" rx="3" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    </pattern>
    <pattern id="greenSquares" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect x="3" y="3" width="12" height="12" rx="3" fill="#39D353"/>
    </pattern>
    <filter id="softGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.83 0 0 0 0 0.33 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="1198" height="218" rx="22" fill="url(#panel)" stroke="#30363D" stroke-width="2"/>
  <text x="52" y="38" fill="#8B949E" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0">
    Contribution Calendar
  </text>
  <text x="1148" y="38" text-anchor="end" fill="#39D353" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="0">
    Open to opportunities
  </text>

  <rect x="52" y="58" width="1096" height="126" fill="url(#emptySquares)"/>
  <text x="600" y="158" text-anchor="middle" fill="url(#greenSquares)" stroke="#39D353" stroke-width="0.6" filter="url(#softGlow)" font-family="Arial Black, Segoe UI Black, Segoe UI, Arial, sans-serif" font-size="118" font-weight="900" letter-spacing="10">
    HIRE ME
  </text>

  <g transform="translate(52 194)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13">
    <text x="0" y="12" fill="#8B949E">Less</text>
    <rect x="38" y="1" width="11" height="11" rx="2" fill="#161B22" stroke="#30363D"/>
    <rect x="56" y="1" width="11" height="11" rx="2" fill="#0E4429"/>
    <rect x="74" y="1" width="11" height="11" rx="2" fill="#006D32"/>
    <rect x="92" y="1" width="11" height="11" rx="2" fill="#26A641"/>
    <rect x="110" y="1" width="11" height="11" rx="2" fill="#39D353"/>
    <text x="128" y="12" fill="#8B949E">More</text>
  </g>
</svg>
