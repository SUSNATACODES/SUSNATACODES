<svg width="940" height="178" viewBox="0 0 940 178" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hire Me contribution calendar</title>
  <desc id="desc">A GitHub contribution calendar style graphic where green contribution squares spell HIRE ME.</desc>
  <defs>
    <pattern id="emptyCell" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect x="0.5" y="0.5" width="10" height="10" rx="2" fill="#161B22" stroke="#21262D"/>
    </pattern>
    <rect id="activeSquare" width="10" height="10" rx="2" fill="#39D353">
      <animate attributeName="opacity" values="0.72;1;0.72" dur="2s" repeatCount="indefinite"/>
    </rect>
    <filter id="glow" x="-8%" y="-18%" width="116%" height="136%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.83 0 0 0 0 0.33 0 0 0 0.75 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="938" height="176" rx="6" fill="#0D1117" stroke="#30363D"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="12" fill="#C9D1D9">
